name: Build Cross-Platform Executables

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: dataforge
            asset_name: dataforge-linux-x64
          - os: windows-latest
            artifact_name: dataforge.exe
            asset_name: dataforge-windows-x64.exe
          - os: macos-latest
            artifact_name: dataforge
            asset_name: dataforge-macos-x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Build executable
        run: uv run pyinstaller --onefile --name dataforge --exclude-module kaggle src/dataforge/main.py
        env:
          PYTHONPATH: src

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
